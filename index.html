<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Data Collection Portal</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Material 3 Custom Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            m3: {
              primary: '#415f91', onPrimary: '#ffffff',
              primaryContainer: '#d6e3ff', onPrimaryContainer: '#001b3e',
              secondary: '#565f71', onSecondary: '#ffffff',
              secondaryContainer: '#dae2f9', onSecondaryContainer: '#131c2b',
              surface: '#f9f9ff', onSurface: '#191c20',
              surfaceVariant: '#e0e2ec', onSurfaceVariant: '#44474e',
              error: '#ba1a1a', onError: '#ffffff',
              errorContainer: '#ffdad6', onErrorContainer: '#410002',
              success: '#0b6b3d', successContainer: '#9cf6b9', onSuccessContainer: '#00210e'
            }
          },
          borderRadius: { '4xl': '2rem', '5xl': '2.5rem' }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #f0f2f5;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
      margin: 0; padding: 0;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    * {
      transition-property: background-color, border-color, color, opacity, box-shadow;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      transition-duration: 200ms;
    }
    .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="text-m3-onSurface">

  <!-- Root Container -->
  <div id="app"></div>

  <!-- Pure Vanilla JavaScript -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { 
      getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, 
      GoogleAuthProvider, onAuthStateChanged, signOut 
    } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { 
      getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot, addDoc, deleteDoc 
    } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    // ==========================================
    // 🔴 Firebase Configuration 🔴
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyDwCpuxAgVtYpJIGTAZ14glZh3996gy-eU",
      authDomain: "data-collection-portal-1bce9.firebaseapp.com",
      projectId: "data-collection-portal-1bce9",
      storageBucket: "data-collection-portal-1bce9.firebasestorage.app",
      messagingSenderId: "397875958510",
      appId: "1:397875958510:web:439c4185722c9c162859ff",
      measurementId: "G-C6X22R15J2"
    };

    const appId = 'data-portal-pro';

    // ==========================================
    // Global State
    // ==========================================
    const state = {
      loading: true,
      errorMessage: '',
      lang: 'bn',
      user: null, 
      profile: null, 
      prices: { '615x': 2, '1000x': 5 },
      forceUserView: false,
      tab: 'submit',
      adminTab: 'pending',
      gridData: Array.from({ length: 100 }, () => Array(4).fill('')),
      submitType: '615x',
      submissions: [],
      withdrawals: [],
      users: [],
      isLoginMode: true,
      authError: '',
      isSubmittingAuth: false,
      isSubmittingData: false,
      submitMessage: '',
      showPasteModal: false,
      viewingSub: null,
      reviewingTask: null,
      isSavingMethod: false,
      withdrawMessage: '',
      adminErrorMsg: '',
      isAdminProcessing: false
    };

    let appInst, authInst, dbInst;
    let unsubs = [];

    const getCol = (name) => collection(dbInst, 'artifacts', appId, 'public', 'data', name);
    const getDocRef = (name, id) => doc(dbInst, 'artifacts', appId, 'public', 'data', name, id);

    // ==========================================
    // Logic Functions
    // ==========================================
    async function boot() {
      try {
        appInst = initializeApp(firebaseConfig);
        authInst = getAuth(appInst);
        dbInst = getFirestore(appInst);

        onAuthStateChanged(authInst, async (currentUser) => {
          if (currentUser) {
            state.user = currentUser;
            await syncUserProfile(currentUser);
          } else {
            cleanupUnsubs();
            state.user = null;
            state.profile = null;
            state.loading = false;
            render();
          }
        });
      } catch (err) {
        state.errorMessage = "Firebase সমস্যা হয়েছে।";
        state.loading = false;
        render();
      }
    }

    function cleanupUnsubs() {
      unsubs.forEach(unsub => unsub());
      unsubs = [];
    }

    async function syncUserProfile(firebaseUser) {
      const userRef = getDocRef('users', firebaseUser.uid);
      const docSnap = await getDoc(userRef);

      if (!docSnap.exists()) {
        const isDefaultAdmin = firebaseUser.email === 'admin@portal.com';
        const newProfile = {
          name: firebaseUser.displayName || firebaseUser.email.split('@')[0],
          email: firebaseUser.email,
          role: isDefaultAdmin ? 'admin' : 'user',
          balance: 0,
          totalEarned: 0,
          createdAt: new Date().toISOString()
        };
        await setDoc(userRef, newProfile);
        state.profile = { id: firebaseUser.uid, ...newProfile };
      } else {
        state.profile = { id: docSnap.id, ...docSnap.data() };
      }
      
      setupRealtimeListeners();
    }

    function setupRealtimeListeners() {
      cleanupUnsubs();

      unsubs.push(onSnapshot(getDocRef('settings', 'pricing'), (doc) => {
        if(doc.exists()) {
          state.prices = doc.data();
          render();
        }
      }, (err) => console.error("Pricing error:", err)));

      unsubs.push(onSnapshot(getDocRef('users', state.user.uid), (docSnap) => {
        if (docSnap.exists()) {
           state.profile = { id: docSnap.id, ...docSnap.data() };
           render();
        }
      }, (err) => console.error("Profile error:", err)));

      unsubs.push(onSnapshot(getCol('submissions'), (snap) => {
        const subs = [];
        snap.forEach(d => {
           const data = { id: d.id, ...d.data() };
           if(state.profile.role === 'admin' || data.userId === state.user.uid) subs.push(data);
        });
        subs.sort((a, b) => new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime());
        state.submissions = subs; 
        render();
      }, (err) => console.error("Submissions error:", err)));

      unsubs.push(onSnapshot(getCol('withdrawals'), (snap) => {
        const ws = [];
        snap.forEach(d => {
           const data = { id: d.id, ...d.data() };
           if(state.profile.role === 'admin' || data.userId === state.user.uid) ws.push(data);
        });
        ws.sort((a, b) => new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime());
        state.withdrawals = ws; render();
      }, (err) => console.error("Withdrawals error:", err)));
      
      if(state.profile.role === 'admin') {
         unsubs.push(onSnapshot(getCol('users'), (snap) => {
            const us = [];
            snap.forEach(d => { const data = { id: d.id, ...d.data() }; if(data.role !== 'admin') us.push(data); });
            state.users = us; render();
         }, (err) => console.error("Users list error:", err)));
      }

      state.loading = false;
      render();
    }

    // ==========================================
    // UI Templates
    // ==========================================
    function render() {
      const root = document.getElementById('app');
      if (state.loading) {
        root.innerHTML = `<div class="min-h-screen flex items-center justify-center bg-m3-surface"><div class="animate-spin rounded-full h-12 w-12 border-4 border-m3-surfaceVariant border-t-m3-primary"></div></div>`;
        return;
      }
      if (!state.user) {
        root.innerHTML = renderLoginScreen();
        return;
      }
      root.innerHTML = renderDashboard();
      attachDOMListeners();
    }

    function renderLoginScreen() {
      return `
        <div class="min-h-screen flex items-center justify-center bg-m3-surface p-4 fade-in">
          <div class="bg-white/90 backdrop-blur-xl p-8 md:p-12 rounded-[2.5rem] shadow-xl max-w-md w-full border border-white">
            <h2 class="text-3xl font-bold text-center text-m3-onSurface mb-2">${state.isLoginMode ? 'লগইন করুন' : 'নতুন একাউন্ট'}</h2>
            <p class="text-sm text-center text-m3-onSurfaceVariant mb-8">পোর্টালটি ব্যবহার করতে সাইন-ইন করুন</p>
            ${state.authError ? `<div class="mb-4 p-3 bg-m3-errorContainer text-m3-error rounded-xl text-xs font-bold">⚠️ ${state.authError}</div>` : ''}
            <form onsubmit="window.handleEmailAuth(event)" class="space-y-4">
              <input id="login-email" type="email" required class="w-full p-4 bg-m3-surface rounded-2xl outline-none ring-1 ring-m3-surfaceVariant focus:ring-2 focus:ring-m3-primary" placeholder="Email Address">
              <input id="login-password" type="password" required class="w-full p-4 bg-m3-surface rounded-2xl outline-none ring-1 ring-m3-surfaceVariant focus:ring-2 focus:ring-m3-primary" placeholder="Password">
              <button type="submit" class="w-full bg-m3-primary text-white p-4 rounded-full font-bold shadow-md hover:opacity-90">
                ${state.isSubmittingAuth ? 'প্রসেসিং...' : (state.isLoginMode ? 'লগইন' : 'রেজিস্টার')}
              </button>
            </form>
            <div class="flex items-center my-6 text-m3-onSurfaceVariant/50"><div class="flex-1 h-px bg-current"></div><div class="px-4 text-[10px] font-black uppercase tracking-widest">অথবা</div><div class="flex-1 h-px bg-current"></div></div>
            <button onclick="window.handleGoogleAuth()" class="w-full bg-white border border-m3-surfaceVariant p-4 rounded-full font-bold flex items-center justify-center gap-3 hover:bg-m3-surface transition-all shadow-sm">
              <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
              Google দিয়ে প্রবেশ করুন
            </button>
            <button onclick="window.toggleAuthMode()" class="w-full mt-6 text-sm font-bold text-m3-primary hover:underline">
              ${state.isLoginMode ? 'নতুন একাউন্ট তৈরি করুন' : 'আগের একাউন্টে লগইন করুন'}
            </button>
          </div>
        </div>
      `;
    }

    function renderDashboard() {
      const isAdmin = state.profile.role === 'admin' && !state.forceUserView;
      return `
        <div class="min-h-screen bg-m3-surface fade-in pb-24">
          <nav class="p-4 md:p-6 sticky top-0 z-40">
            <div class="max-w-5xl mx-auto bg-white/90 backdrop-blur-xl rounded-full px-6 py-3 shadow-sm border border-white/50 flex justify-between items-center">
              <span class="text-xl font-bold text-m3-onSurface tracking-tighter">DATA PORTAL</span>
              <div class="flex items-center gap-3">
                ${state.profile.role === 'admin' ? `<button onclick="window.toggleForceUser()" class="text-[10px] uppercase font-black tracking-widest px-4 py-2 rounded-full bg-m3-secondaryContainer text-m3-onSecondaryContainer">${state.forceUserView ? 'ADMIN' : 'USER'}</button>` : ''}
                ${!isAdmin ? `<div class="bg-m3-successContainer text-m3-onSuccessContainer px-5 py-2 rounded-full font-black text-sm shadow-sm">৳ ${state.profile.balance}</div>` : ''}
                <button onclick="window.logout()" class="text-m3-error bg-m3-errorContainer/30 p-2 rounded-full hover:bg-m3-errorContainer"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></button>
              </div>
            </div>
          </nav>
          <main class="max-w-5xl mx-auto p-4 md:p-6">
             ${isAdmin ? renderAdminArea() : renderUserArea()}
          </main>
          ${state.showPasteModal ? renderPasteModal() : ''}
          ${state.viewingSub ? renderViewDetailsModal() : ''}
          ${state.reviewingTask ? renderReviewModal() : ''}
        </div>
      `;
    }

    function renderUserArea() {
      return `
        <div class="flex bg-m3-surfaceVariant/50 p-1.5 rounded-full mb-8 overflow-x-auto no-scrollbar w-fit mx-auto shadow-sm">
          <button onclick="window.setTab('submit')" class="px-6 py-2.5 rounded-full font-bold text-sm ${state.tab === 'submit' ? 'bg-m3-primaryContainer text-m3-onPrimaryContainer shadow-sm' : 'text-m3-onSurfaceVariant'}">ডাটা সাবমিট</button>
          <button onclick="window.setTab('history')" class="px-6 py-2.5 rounded-full font-bold text-sm ${state.tab === 'history' ? 'bg-m3-primaryContainer text-m3-onPrimaryContainer shadow-sm' : 'text-m3-onSurfaceVariant'}">হিস্ট্রি</button>
          <button onclick="window.setTab('withdraw')" class="px-6 py-2.5 rounded-full font-bold text-sm ${state.tab === 'withdraw' ? 'bg-m3-primaryContainer text-m3-onPrimaryContainer shadow-sm' : 'text-m3-onSurfaceVariant'}">উত্তোলন</button>
        </div>
        ${state.tab === 'submit' ? renderSubmitForm() : ''}
        ${state.tab === 'history' ? renderUserHistory() : ''}
        ${state.tab === 'withdraw' ? renderUserWithdraw() : ''}
      `;
    }

    function renderSubmitForm() {
      let gridHtml = '';
      for(let r=0; r<100; r++) {
         gridHtml += `<tr class="hover:bg-m3-primaryContainer/20 transition-colors">
            <td class="text-center text-[10px] font-black text-m3-onSurfaceVariant/50 bg-m3-surface border-r border-b border-m3-outline/20 w-12">${r + 1}</td>`;
         for(let c=0; c<4; c++) {
            gridHtml += `<td class="p-0 border-r border-b border-m3-outline/20 h-10">
              <input type="text" data-r="${r}" data-c="${c}" class="spreadsheet-cell w-full h-full px-3 outline-none focus:bg-white text-sm bg-transparent" value="${state.gridData[r][c]}">
            </td>`;
         }
         gridHtml += `</tr>`;
      }
      return `
        <div class="bg-white rounded-[2.5rem] p-8 md:p-12 shadow-sm border border-m3-surfaceVariant fade-in">
          <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-m3-onSurface tracking-tight">ডাটা এন্ট্রি করুন</h2>
            <div class="flex gap-2">
              <button onclick="window.openPasteModal()" class="bg-m3-primaryContainer text-m3-onPrimaryContainer px-5 py-2 rounded-full font-bold text-sm shadow-sm">📋 স্মার্ট পেস্ট</button>
              <button onclick="window.resetGrid()" class="bg-m3-errorContainer text-m3-error px-5 py-2 rounded-full font-bold text-sm shadow-sm">🔄 রিসেট</button>
            </div>
          </div>
          ${state.submitMessage ? `<div class="mb-6 p-4 rounded-2xl text-sm font-bold bg-m3-successContainer text-m3-onSuccessContainer shadow-sm border border-m3-success">${state.submitMessage}</div>` : ''}
          <div class="grid grid-cols-2 gap-4 mb-8">
             <button onclick="window.setSubmitType('615x')" class="p-6 border-2 rounded-[2rem] text-center transition-all ${state.submitType === '615x' ? 'border-m3-primary bg-m3-primaryContainer/30' : 'border-m3-surfaceVariant'}">
                <div class="font-black text-m3-onSurface">615x</div><div class="text-xs opacity-70 mt-1">৳${state.prices['615x']} প্রতিটি</div>
             </button>
             <button onclick="window.setSubmitType('1000x')" class="p-6 border-2 rounded-[2rem] text-center transition-all ${state.submitType === '1000x' ? 'border-m3-primary bg-m3-primaryContainer/30' : 'border-m3-surfaceVariant'}">
                <div class="font-black text-m3-onSurface">1000x</div><div class="text-xs opacity-70 mt-1">৳${state.prices['1000x']} প্রতিটি</div>
             </button>
          </div>
          <div class="overflow-auto max-h-[400px] border border-m3-surfaceVariant rounded-3xl mb-8">
            <table class="w-full border-collapse" id="spreadsheet">
              <thead class="sticky top-0 bg-m3-surfaceVariant z-10 text-[10px] font-black tracking-widest text-m3-onSurfaceVariant/70 uppercase">
                <tr><th class="w-12 border-r border-m3-outline/20 p-3">#</th><th class="p-3">A</th><th class="p-3">B</th><th class="p-3">C</th><th class="p-3">D</th></tr>
              </thead>
              <tbody>${gridHtml}</tbody>
            </table>
          </div>
          <button onclick="window.submitData()" ${state.isSubmittingData ? 'disabled' : ''} class="w-full bg-m3-primary text-m3-onPrimary py-5 rounded-full font-black text-lg hover:opacity-90 shadow-lg shadow-m3-primary/20">
             ${state.isSubmittingData ? 'সাবমিট হচ্ছে...' : 'সাবমিট করুন'}
          </button>
        </div>
      `;
    }

    function renderPasteModal() {
      return `
        <div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in">
          <div class="bg-white rounded-[2.5rem] p-8 max-w-lg w-full shadow-2xl">
            <h3 class="font-bold text-2xl mb-4 text-m3-onSurface">স্মার্ট পেস্ট</h3>
            <p class="text-xs text-m3-onSurfaceVariant mb-4">গুগল শিট থেকে ডাটা কপি করে এখানে পেস্ট করুন (UID এবং Password)</p>
            <textarea id="pasteArea" class="w-full h-48 bg-m3-surface border border-m3-surfaceVariant rounded-[1.5rem] p-5 mb-6 outline-none focus:ring-2 focus:ring-m3-primary" placeholder="UID [TAB] Password..."></textarea>
            <div class="flex justify-end gap-3">
              <button onclick="window.closePasteModal()" class="px-6 py-2 bg-m3-surfaceVariant rounded-full font-bold text-m3-onSurfaceVariant">বাতিল</button>
              <button onclick="window.applyPaste()" class="px-8 py-2 bg-m3-primary text-m3-onPrimary rounded-full font-bold shadow-md">এপ্লাই</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderUserHistory() {
      if(state.submissions.length === 0) return `<div class="text-center p-20 bg-white rounded-[2.5rem] font-bold text-m3-onSurfaceVariant border border-m3-surfaceVariant fade-in">কোনো ডাটা সাবমিট করা হয়নি।</div>`;
      return `<div class="space-y-4 fade-in">
        ${state.submissions.map(sub => `
          <div class="bg-white p-6 rounded-[1.5rem] flex flex-col md:flex-row justify-between md:items-center gap-4 shadow-sm border border-m3-surfaceVariant">
            <div>
              <div class="font-black text-lg text-m3-onSurface">${sub.type} <span class="text-[9px] bg-m3-primaryContainer text-m3-onPrimaryContainer px-2 py-0.5 rounded-full ml-2 uppercase font-black tracking-widest">${sub.status}</span></div>
              <div class="text-xs text-m3-onSurfaceVariant mt-1">মোট ডাটা: ${sub.totalItems} | তারিখ: ${new Date(sub.createdAt).toLocaleDateString()}</div>
            </div>
            <div class="flex items-center gap-3">
              ${sub.status === 'reviewed' ? `
                <div class="text-sm font-black flex gap-4 bg-m3-surface px-4 py-2 rounded-xl">
                   <span class="text-m3-success">✓ ${sub.acceptedCount}</span>
                   <span class="text-m3-error">✗ ${sub.rejectedCount}</span>
                   <span class="text-m3-primary border-l pl-4 border-m3-surfaceVariant">৳${sub.payout}</span>
                </div>
              ` : ''}
              <button onclick="window.viewSubDetails('${sub.id}')" class="bg-m3-secondaryContainer text-m3-onSecondaryContainer px-6 py-2 rounded-full font-black text-xs shadow-sm">বিস্তারিত</button>
            </div>
          </div>
        `).join('')}
      </div>`;
    }

    function renderViewDetailsModal() {
      const sub = state.viewingSub;
      return `
        <div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in">
          <div class="bg-white rounded-[2.5rem] p-8 max-w-2xl w-full shadow-2xl max-h-[80vh] overflow-hidden flex flex-col">
            <div class="flex justify-between items-center mb-6">
              <h3 class="font-bold text-2xl text-m3-onSurface">ডাটা বিস্তারিত</h3>
              <button onclick="window.closeSubDetails()" class="bg-m3-errorContainer text-m3-error p-2 rounded-full"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            </div>
            <div class="flex-1 overflow-auto border border-m3-surfaceVariant rounded-2xl">
              <table class="w-full text-left text-sm">
                <thead class="bg-m3-surface sticky top-0 border-b border-m3-surfaceVariant"><tr><th class="p-4 font-black text-[10px] uppercase">UID</th><th class="p-4 font-black text-[10px] uppercase">Password</th><th class="p-4 text-center font-black text-[10px] uppercase">Status</th></tr></thead>
                <tbody class="divide-y divide-m3-surfaceVariant">
                  ${sub.items.map(it => {
                    const parts = it.text.split(' - ');
                    return `<tr>
                      <td class="p-4 font-mono text-xs font-bold text-m3-primary">${parts[0]||'-'}</td>
                      <td class="p-4 font-mono text-xs font-bold text-m3-onSurfaceVariant">${parts[1]||'-'}</td>
                      <td class="p-4 text-center"><span class="text-[9px] font-black uppercase bg-m3-surfaceVariant px-2 py-0.5 rounded-md">${it.status}</span></td>
                    </tr>`;
                  }).join('')}
                </tbody>

            </div>
          </div>
        </div>

    }

       return `

          <button onclick="window.setAdminTab('withdrawals')" class="px-6 py-2.5 rounded-full font-bold text-sm ${state.adminTab === 'withdrawals' ? 'bg-m3-primaryContainer text-m3-onPrimaryContainer' : 'text-m3-onSurfaceVariant'}">উইথড্র</button>
          <button onclick="window.setAdminTab('users')" class="px-6 py-2.5 rounded-full font-bold text-sm ${state.adminTab === 'users' ? 'bg-m3-primaryContainer text-m3-onPrimaryContainer' : 'text-m3-onSurfaceVariant'}">ইউজার</button>

    function renderAdminPending() {
      return `
        <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-m3-surfaceVariant fade-in">
          <h2 class="text-2xl font-bold mb-8 text-m3-onSurface">অপেক্ষমান কাজ</h2>
          <div class="space-y-4">
            ${state.submissions.map(sub => `
              <div class="bg-m3-surface border border-m3-surfaceVariant p-6 rounded-[2rem] flex flex-col md:flex-row justify-between md:items-center gap-4">
                <div>
                  <div class="font-black text-lg text-m3-onSurface">${sub.userName} <span class="text-[9px] bg-m3-primaryContainer text-m3-onPrimaryContainer px-2 py-0.5 rounded-lg ml-2 font-black">${sub.type}</span></div>
                  <div class="text-xs text-m3-onSurfaceVariant mt-1">মোট ডাটা: ${sub.totalItems} | স্ট্যাটাস: ${sub.status.toUpperCase()}</div>
                </div>
                ${sub.status === 'pending' ? `<button onclick="window.openReview('${sub.id}')" class="bg-m3-primary text-white px-8 py-3 rounded-full font-black text-xs shadow-md">রিভিউ করুন</button>` : `<span class="text-[9px] font-black text-m3-success uppercase bg-m3-successContainer px-4 py-2 rounded-full border border-m3-success">PAID ৳${sub.payout}</span>`}
              </div>

          </div>
        </div>
      `;
    }

    function renderReviewModal() {
      const t = state.reviewingTask;
      const price = state.prices[t.type] || 0;
      const pend = t.items.filter(i => i.status === 'pending').length;
      const acc = t.items.filter(i => i.status === 'accepted').length;
      return `
        <div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in">
          <div class="bg-white rounded-[2.5rem] p-8 max-w-4xl w-full max-h-[90vh] overflow-hidden flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-6">
              <h3 class="font-bold text-2xl text-m3-onSurface">রিভিউ: ${t.userName}</h3>
              <button onclick="window.closeReview()" class="bg-m3-surfaceVariant p-2 rounded-full"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            </div>
            <div class="grid grid-cols-3 gap-4 mb-8">
               <div class="bg-m3-surface p-4 rounded-2xl text-center border border-m3-surfaceVariant"><div class="text-[9px] font-black opacity-60 uppercase">মোট</div><div class="text-xl font-black">${t.items.length}</div></div>
               <div class="bg-m3-successContainer/30 p-4 rounded-2xl text-center border border-m3-successContainer"><div class="text-[9px] font-black text-m3-success uppercase">গৃহীত</div><div class="text-xl font-black text-m3-success">${acc}</div></div>
               <div class="bg-m3-primaryContainer/30 p-4 rounded-2xl text-center border border-m3-primaryContainer"><div class="text-[9px] font-black text-m3-primary uppercase">৳ হবে</div><div class="text-xl font-black text-m3-primary">৳${acc * price}</div></div>
            </div>
            <div class="flex-1 overflow-auto border border-m3-surfaceVariant rounded-2xl mb-8">
              <table class="w-full text-left text-xs">
                <thead class="bg-m3-surface sticky top-0 border-b border-m3-surfaceVariant"><tr><th class="p-4 font-black">UID</th><th class="p-4 font-black">Password</th><th class="p-4 text-center font-black">Action</th></tr></thead>
                <tbody class="divide-y divide-m3-surfaceVariant">
                  ${t.items.map(it => {
                    const parts = it.text.split(' - ');
                    return `<tr>
                      <td class="p-4 font-mono font-bold text-m3-primary">${parts[0]||'-'}</td>
                      <td class="p-4 font-mono font-bold text-m3-onSurfaceVariant">${parts[1]||'-'}</td>
                      <td class="p-4 text-center">
                        ${it.status === 'pending' ? `
                          <button onclick="window.reviewItem('${it.id}', 'accepted')" class="bg-m3-success text-white px-4 py-1.5 rounded-full font-black text-[9px] shadow-sm">ACC</button>
                          <button onclick="window.reviewItem('${it.id}', 'rejected')" class="bg-m3-error text-white px-4 py-1.5 rounded-full font-black text-[9px] shadow-sm ml-2">REJ</button>
                        ` : `<span class="text-[9px] font-black uppercase px-3 py-1 bg-m3-surfaceVariant rounded-md">${it.status}</span>`}
                      </td>
                    </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>
            <div class="flex gap-4">
               <button onclick="window.acceptAll()" class="flex-1 bg-m3-surfaceVariant text-m3-onSurfaceVariant py-4 rounded-full font-black text-xs">সবগুলো একসেপ্ট</button>
               <button onclick="window.finalizeReview()" ${state.isAdminProcessing?'disabled':''} class="flex-1 bg-m3-primary text-white py-4 rounded-full font-black text-xs shadow-lg">রিভিউ সম্পন্ন করুন</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderAdminWithdrawals() {
      return `
        <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-m3-surfaceVariant fade-in">
          <h2 class="text-2xl font-bold mb-8 text-m3-onSurface">উত্তোলন রিকোয়েস্ট</h2>
          <div class="space-y-4">
            ${state.withdrawals.map(w => `
              <div class="bg-m3-surface border border-m3-surfaceVariant p-6 rounded-[2rem] flex flex-col md:flex-row justify-between md:items-center gap-4">
                <div><div class="font-black text-lg text-m3-onSurface">${w.userName} <span class="text-m3-success font-black text-2xl ml-2">৳${w.amount}</span></div><div class="text-[10px] font-black mt-1 text-m3-primary uppercase">${w.method}: ${w.accountNo}</div></div>
                ${w.status === 'pending' ? `<div class="flex gap-2"><button onclick="window.processWithdraw('${w.id}', 'paid', ${w.amount}, '${w.userId}')" class="bg-m3-primary text-white px-8 py-3 rounded-full font-black text-xs shadow-md">PAID</button><button onclick="window.processWithdraw('${w.id}', 'rejected', ${w.amount}, '${w.userId}')" class="bg-m3-error text-white px-8 py-3 rounded-full font-black text-xs shadow-md">REJECT</button></div>` : `<span class="text-[9px] font-black uppercase bg-white border border-m3-surfaceVariant px-5 py-2 rounded-full">${w.status}</span>`}
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderAdminUsers() {
      return `
        <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-m3-surfaceVariant fade-in">
          <h2 class="text-2xl font-bold mb-8 text-m3-onSurface">ইউজার লিস্ট</h2>
          <div class="overflow-x-auto rounded-3xl border border-m3-surfaceVariant">
            <table class="w-full text-left text-xs"><thead class="bg-m3-surface border-b border-m3-surfaceVariant"><tr><th class="p-5 font-black uppercase tracking-widest opacity-60">নাম</th><th class="p-5 font-black text-right uppercase tracking-widest opacity-60">ব্যালেন্স</th><th class="p-5 font-black text-right uppercase tracking-widest opacity-60">মোট আয়</th></tr></thead>
              <tbody class="divide-y divide-m3-surfaceVariant">
                ${state.users.map(u => `<tr><td class="p-5 font-black text-m3-onSurface">${u.name}</td><td class="p-5 text-right font-black text-m3-primary text-xl">৳${u.balance}</td><td class="p-5 text-right font-bold text-m3-onSurfaceVariant opacity-70">৳${u.totalEarned}</td></tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderAdminSettings() {
      return `
        <div class="bg-white rounded-[2.5rem] p-10 shadow-sm border border-m3-surfaceVariant max-w-md mx-auto fade-in">
          <h2 class="text-2xl font-bold mb-8 text-center text-m3-onSurface">সিস্টেম প্রাইস</h2>
          <form onsubmit="window.savePrices(event)" class="space-y-6">
            <div class="bg-m3-surface p-6 rounded-[2rem]">
              <label class="block font-black text-[10px] uppercase tracking-widest text-m3-onSurfaceVariant mb-3">615x প্রাইস (৳)</label>
              <input id="p615" type="number" class="w-full bg-white border-none rounded-2xl p-4 font-black text-3xl text-center outline-none ring-1 ring-m3-surfaceVariant focus:ring-2 focus:ring-m3-primary" value="${state.prices['615x']}">
            </div>
            <div class="bg-m3-surface p-6 rounded-[2rem]">
              <label class="block font-black text-[10px] uppercase tracking-widest text-m3-onSurfaceVariant mb-3">1000x প্রাইস (৳)</label>
              <input id="p1000" type="number" class="w-full bg-white border-none rounded-2xl p-4 font-black text-3xl text-center outline-none ring-1 ring-m3-surfaceVariant focus:ring-2 focus:ring-m3-primary" value="${state.prices['1000x']}">
            </div>
            <button type="submit" class="w-full bg-m3-primary text-white py-5 rounded-full font-black shadow-lg shadow-m3-primary/20 hover:opacity-90">আপডেট করুন</button>
          </form>
        </div>
      `;
    }

    // ==========================================
    // Interaction Functions
    // ==========================================
    function attachDOMListeners() {
      const cells = document.querySelectorAll('.spreadsheet-cell');
      cells.forEach(cell => {
        cell.oninput = (e) => { state.gridData[e.target.dataset.r][e.target.dataset.c] = e.target.value; };
        cell.onpaste = (e) => {
          e.preventDefault();
          const text = e.clipboardData.getData('text');
          window.handleActionCellPaste(text, parseInt(e.target.dataset.r), parseInt(e.target.dataset.c));
        };
      });
    }

    window.toggleAuthMode = () => { state.isLoginMode = !state.isLoginMode; state.authError = ''; render(); };
    window.toggleForceUser = () => { state.forceUserView = !state.forceUserView; render(); };
    window.setTab = (t) => { state.tab = t; render(); };
    window.setAdminTab = (t) => { state.adminTab = t; render(); };
    window.setSubmitType = (t) => { state.submitType = t; render(); };
    window.openPasteModal = () => { state.showPasteModal = true; render(); };
    window.closePasteModal = () => { state.showPasteModal = false; render(); };
    window.applyPaste = () => {
      const val = document.getElementById('pasteArea').value;
      window.handleActionCellPaste(val, 0, 0);
      state.showPasteModal = false; render();
    };
    window.handleActionCellPaste = (text, startR, startC) => {
      const rows = text.split(/\r?\n/).map(r => r.split('\t'));
      for (let i = 0; i < rows.length; i++) {
        if (startR + i >= 100) break;
        for (let j = 0; j < rows[i].length; j++) {
          if (startC + j >= 4) break;
          state.gridData[startR + i][startC + j] = rows[i][j] || '';
        }
      }
      render();
    };
    window.resetGrid = () => { state.gridData = Array.from({ length: 100 }, () => Array(4).fill('')); render(); };
    
    window.handleEmailAuth = async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-password').value;
      state.isSubmittingAuth = true; state.authError = ''; render();
      try {
        if (state.isLoginMode) {
          await signInWithEmailAndPassword(authInst, email, pass);
        } else {
          await createUserWithEmailAndPassword(authInst, email, pass);
        }
      } catch (err) {
        state.authError = "ভুল ইমেইল বা পাসওয়ার্ড!";
        state.isSubmittingAuth = false; render();
      }
    };

    window.handleGoogleAuth = async () => {
      try {
        const provider = new GoogleAuthProvider();
        await signInWithPopup(authInst, provider);
      } catch (err) {
        state.authError = "Google লগইন ব্যর্থ হয়েছে।";
        render();
      }
    };

    window.logout = () => signOut(authInst);

    window.submitData = async () => {
      let allItems = [];
      state.gridData.forEach(row => {
        const text = row.filter(c => c.trim() !== '').join(' - ');
        if(text) allItems.push(text);
      });
      if (allItems.length === 0) return;
      state.isSubmittingData = true; render();
      try {
        await addDoc(getCol('submissions'), {
          userId: state.user.uid,
          userName: state.profile.name,
          type: state.submitType,
          items: allItems.map(t => ({text: t, status: 'pending'})),
          totalItems: allItems.length,
          status: 'pending',
          createdAt: new Date().toISOString()
        });
        state.gridData = Array.from({ length: 100 }, () => Array(4).fill('')); 
        state.submitMessage = "সফলভাবে সাবমিট হয়েছে!";
        state.isSubmittingData = false; render();
        setTimeout(() => { state.tab = 'history'; state.submitMessage = ''; render(); }, 1500);
      } catch(err) { state.isSubmittingData = false; render(); }
    };

    window.viewSubDetails = (id) => { state.viewingSub = state.submissions.find(s=>s.id===id); render(); };
    window.closeSubDetails = () => { state.viewingSub = null; render(); };
    
    window.saveMethod = async (e) => {
      e.preventDefault(); 
      await updateDoc(getDocRef('users', state.user.uid), { withdrawMethod: document.getElementById('wMethod').value, withdrawAccount: document.getElementById('wAcc').value }).catch(e=>e);
      alert("পেমেন্ট মেথড সেভ হয়েছে!");
    };
    window.requestWithdraw = async (e) => {
      e.preventDefault();
      const amount = parseInt(document.getElementById('wAmount').value);
      if(!state.profile.withdrawAccount) { state.withdrawMessage="আগে পেমেন্ট মেথড সেভ করুন!"; render(); return; }
      if(amount > state.profile.balance || amount < 100) { state.withdrawMessage="পরিমাণ সঠিক নয়!"; render(); return; }
      try {
        await updateDoc(getDocRef('users', state.user.uid), { balance: state.profile.balance - amount });
        await addDoc(getCol('withdrawals'), { userId: state.user.uid, userName: state.profile.name, amount, method: state.profile.withdrawMethod, accountNo: state.profile.withdrawAccount, status: 'pending', createdAt: new Date().toISOString() });
        state.withdrawMessage="রিকোয়েস্ট পাঠানো হয়েছে!"; render(); setTimeout(()=> { state.withdrawMessage=''; render(); }, 3000);
      } catch(err) { console.error(err); }
    };

    window.openReview = (id) => { state.reviewingTask = JSON.parse(JSON.stringify(state.submissions.find(s=>s.id===id))); render(); };
    window.closeReview = () => { state.reviewingTask = null; render(); };
    window.reviewItem = (id, status) => { const it = state.reviewingTask.items.find(i=>i.id===id); if(it) it.status = status; render(); };
    window.acceptAll = () => { state.reviewingTask.items.forEach(i => { if(i.status==='pending') i.status='accepted'; }); render(); };
    window.finalizeReview = async () => {
      if(state.reviewingTask.items.some(i=>i.status==='pending')) { state.adminErrorMsg = "সবগুলো রিভিউ করুন!"; render(); return; }
      state.isAdminProcessing = true; render();
      try {
        const accCount = state.reviewingTask.items.filter(i=>i.status==='accepted').length;
        const rejCount = state.reviewingTask.items.filter(i=>i.status==='rejected').length;
        const payout = accCount * (state.prices[state.reviewingTask.type] || 0);
        const uRef = getDocRef('users', state.reviewingTask.userId);
        const uDoc = await getDoc(uRef);
        if(uDoc.exists()) await updateDoc(uRef, { balance: (uDoc.data().balance||0)+payout, totalEarned: (uDoc.data().totalEarned||0)+payout });
        await updateDoc(getDocRef('submissions', state.reviewingTask.id), { status: 'reviewed', items: state.reviewingTask.items, acceptedCount: accCount, rejectedCount: rejCount, payout });
        state.reviewingTask = null;
      } catch(e) { console.error(e); }
      state.isAdminProcessing = false; render();
    };

    window.processWithdraw = async (id, status, amount, userId) => {
      await updateDoc(getDocRef('withdrawals', id), { status });
      if(status === 'rejected') {
         const uRef = getDocRef('users', userId);
         const uDoc = await getDoc(uRef);
         if(uDoc.exists()) await updateDoc(uRef, { balance: (uDoc.data().balance||0) + amount });
      }
    };

    window.savePrices = async (e) => {
      e.preventDefault();
      await setDoc(getDocRef('settings', 'pricing'), { '615x': Number(document.getElementById('p615').value), '1000x': Number(document.getElementById('p1000').value) });
      alert("সিস্টেম প্রাইস আপডেট হয়েছে!");
    };

    boot();
  </script>
</body>
</html>
