    function render() {
      if (!isFirebaseConfigured) {
        appEl.innerHTML = renderMissingConfig();
        return;
      }
      if (state.user === undefined) { // Initial loading
        appEl.innerHTML = renderLoading();
        return;
      }
      if (!state.activeUsername || !state.profile) {
        appEl.innerHTML = renderLogin();
        return;
      }
      appEl.innerHTML = renderMainApp();

    function renderSubmitData() {
      // Pre-generate spreadsheet HTML
      let gridHtml = '';
      const colLabels = ['A', 'B', 'C', 'D'];
      for(let r=0; r<100; r++) {
         gridHtml += `<tr class="hover:bg-m3-primaryContainer/20 focus-within:bg-m3-primaryContainer/30 transition-colors group">
            <td class="sticky left-0 border-b border-r border-m3-outline/20 bg-m3-surface group-hover:bg-m3-primaryContainer/20 text-center text-xs font-bold text-m3-onSurfaceVariant/70 w-12 select-none z-0">${r + 1}</td>`;
         for(let c=0; c<4; c++) {
            gridHtml += `<td class="border-b border-r border-m3-outline/20 p-0 h-10">
              <input type="text" data-r="${r}" data-c="${c}" class="spreadsheet-cell w-full h-full px-3 outline-none focus:ring-2 focus:ring-m3-primary focus:z-20 relative rounded-none border-none text-sm bg-transparent font-medium text-m3-onSurface" value="${state.gridData[r][c]}">
            </td>`;
         }
         gridHtml += `</tr>`;
      }

      return `
        <div class="bg-white rounded-[2rem] p-6 md:p-10 shadow-sm border border-m3-surfaceVariant fade-in">
          <div class="flex flex-col md:flex-row justify-between md:items-center mb-8 gap-4">
            <h2 class="text-2xl font-bold text-m3-onSurface tracking-tight">${t('newSubmit')}</h2>
            <div class="flex gap-3">
              <button onclick="handleAction('openPaste')" class="px-5 py-2.5 bg-m3-primaryContainer text-m3-onPrimaryContainer font-bold rounded-full hover:opacity-90 transition-all text-sm flex items-center gap-2">📋 ${t('smartPaste')}</button>
              <button onclick="handleAction('resetGrid')" class="px-5 py-2.5 bg-m3-errorContainer text-m3-onErrorContainer font-bold rounded-full hover:opacity-90 transition-all text-sm flex items-center gap-2">🔄 ${t('reset')}</button>
            </div>
          </div>

          ${state.submitMessage ? `
            <div class="mb-8 p-4 rounded-2xl text-sm font-bold flex items-center gap-3 ${state.submitMessage.includes('সমস্যা') || state.submitMessage.includes('Error') || state.submitMessage.includes('No data') || state.submitMessage.includes('কোনো ডাটা') ? 'bg-m3-errorContainer text-m3-onErrorContainer' : 'bg-m3-successContainer text-m3-onSuccessContainer'}">
              ${icons.CheckCircle.replace('16','20').replace('16','20')} ${state.submitMessage}
            </div>
          ` : ''}
          
          <form onsubmit="handleAction('submitSpreadsheet', event)" class="space-y-8">
            <div>
              <label class="block text-sm font-bold text-m3-onSurfaceVariant mb-3 ml-2">${t('catSelect')}</label>
              <div class="grid grid-cols-2 gap-4">
                <label class="cursor-pointer p-6 border-2 rounded-[1.5rem] text-center transition-all ${state.submitType === '615x' ? 'border-m3-primary bg-m3-primaryContainer/30 text-m3-primary' : 'border-m3-surfaceVariant bg-m3-surface hover:bg-m3-surfaceVariant/50'}">
                  <input type="radio" name="type" class="hidden" ${state.submitType === '615x' ? 'checked' : ''} onclick="handleAction('setSubmitType','615x')">
                  <div class="font-bold text-lg">PC Clone 615x</div>
                  <div class="text-sm font-medium mt-1 opacity-80">${t('each')} ৳${state.prices['615x']}</div>
                </label>
                <label class="cursor-pointer p-6 border-2 rounded-[1.5rem] text-center transition-all ${state.submitType === '1000x' ? 'border-m3-primary bg-m3-primaryContainer/30 text-m3-primary' : 'border-m3-surfaceVariant bg-m3-surface hover:bg-m3-surfaceVariant/50'}">
                  <input type="radio" name="type" class="hidden" ${state.submitType === '1000x' ? 'checked' : ''} onclick="handleAction('setSubmitType','1000x')">
                  <div class="font-bold text-lg">PC Clone 1000x</div>
                  <div class="text-sm font-medium mt-1 opacity-80">${t('each')} ৳${state.prices['1000x']}</div>
                </label>
              </div>
            </div>

            <div>
              <label class="block text-sm font-bold text-m3-onSurfaceVariant mb-3 ml-2">${t('enterDataInfo')}</label>
              
              <div class="overflow-auto max-h-[400px] border border-m3-surfaceVariant rounded-[1.5rem] bg-white">
                <table class="w-full border-collapse table-fixed" id="spreadsheet-table">
                  <thead class="sticky top-0 z-10 bg-m3-surfaceVariant">
                    <tr>
                       <th class="w-12 border-b border-r border-m3-outline/20"></th>
                       ${colLabels.map(label => `<th class="border-b border-r border-m3-outline/20 px-3 py-2 font-bold text-m3-onSurfaceVariant text-sm">${label}</th>`).join('')}
                    </tr>
                  </thead>
                  <tbody>
                    ${gridHtml}
                  </tbody>
                </table>
              </div>
              <p class="text-xs font-bold text-m3-error mt-3 ml-2">${t('dupWarning')}</p>
            </div>

            <button type="submit" ${state.isSubmittingData ? 'disabled' : ''} class="w-full bg-m3-primary text-m3-onPrimary p-5 rounded-full font-bold text-lg hover:opacity-90 transition-all disabled:opacity-50 shadow-md flex justify-center items-center gap-2">
              ${state.isSubmittingData ? t('processing') : `${t('submitBtn')} ${icons.ArrowRight}`}
            </button>
          </form>
        </div>
      `;
    }

                <div class="bg-m3-surface border border-m3-surfaceVariant p-5 md:p-6 rounded-[1.5rem] flex flex-col md:flex-row justify-between items-start md:items-center gap-5 hover:shadow-md transition-shadow">
                  <div>
                    <div class="flex items-center gap-3 mb-2">
                      <span class="font-bold text-m3-onSurface text-lg">${sub.type === '615x' ? 'PC Clone 615x' : 'PC Clone 1000x'}</span>
                      ${renderBadge(sub.status)}

                    <div class="text-sm font-medium text-m3-onSurfaceVariant flex items-center gap-3">
                      <span>${t('totalData')} ${sub.totalItems}</span>
                      <span class="w-1.5 h-1.5 bg-m3-outline/30 rounded-full"></span>
                      <span>${new Date(sub.createdAt).toLocaleDateString()}</span>

                  </div>
                  
                  <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                    ${sub.status === 'reviewed' ? `

                        <div class="text-m3-primary font-black px-2 border-l border-m3-surfaceVariant">৳${sub.payout}</div>
                      </div>
                    ` : ''}
                    <button onclick="handleAction('viewSubDetails', '${sub.id}')" class="flex-1 md:flex-none px-5 py-3 bg-m3-secondaryContainer text-m3-onSecondaryContainer hover:opacity-90 rounded-full flex justify-center items-center gap-2 font-bold text-sm transition-all">
                      ${icons.Eye} ${t('details')}
                    </button>
                  </div>
                </div>
              `).join('')}
            </div>
          `}
        </div>
      `;
    }

    function renderViewDetailsModal() {
      const sub = state.viewingSub;
      return `
        <div class="fixed inset-0 bg-m3-onSurface/40 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in">
          <div class="bg-white rounded-[2rem] shadow-xl max-w-2xl w-full p-6 md:p-10">

              <h3 class="font-bold text-2xl text-m3-onSurface">${t('subDetails')}</h3>
              <button onclick="handleAction('closeSubDetails')" class="text-m3-onSurfaceVariant hover:bg-m3-surfaceVariant p-2 rounded-full transition-colors">${icons.XCircle.replace('16','28').replace('16','28')}</button>
            </div>
            
            <div class="max-h-96 overflow-y-auto border border-m3-surfaceVariant rounded-[1.5rem]">
              <table class="w-full text-sm text-left">
                <thead class="text-xs text-m3-onSurfaceVariant bg-m3-surface uppercase sticky top-0 font-bold tracking-wider">
                  <tr>
                    <th class="px-5 py-4 border-b border-m3-surfaceVariant">${t('uid')}</th>
                    <th class="px-5 py-4 border-b border-m3-surfaceVariant">${t('password')}</th>
                    <th class="px-5 py-4 border-b border-m3-surfaceVariant w-32 text-center">${t('status')}</th>
                  </tr>
                </thead>
                <tbody>
                  ${sub.items.map(it => {
                    const parts = it.text.split(' - ');
                    const uid = parts[0] || '-';
                    const pass = parts[1] || '-';
                    let statusHtml = '';
                    if(it.status === 'pending') statusHtml = `<span class="text-[#935c00] font-bold text-xs bg-[#ffdea3] px-3 py-1.5 rounded-lg">Pending</span>`;
                    if(it.status === 'accepted') statusHtml = `<span class="text-m3-success font-bold flex items-center justify-center gap-1.5 text-xs bg-m3-successContainer px-3 py-1.5 rounded-lg">${icons.CheckCircle.replace('16','14').replace('16','14')} Acc</span>`;
                    if(it.status === 'rejected') statusHtml = `<span class="text-m3-error font-bold flex items-center justify-center gap-1.5 text-xs bg-m3-errorContainer px-3 py-1.5 rounded-lg">${icons.XCircle.replace('16','14').replace('16','14')} Rej</span>`;
                    
                    return `
                      <tr class="border-b border-m3-surfaceVariant last:border-0 hover:bg-m3-surface transition-colors">
                        <td class="px-5 py-3 font-mono text-xs font-bold text-m3-onSurface">${uid}</td>
                        <td class="px-5 py-3 font-mono text-xs font-bold text-m3-onSurface">${pass}</td>
                        <td class="px-5 py-3 text-center">${statusHtml}</td>
                      </tr>
                    `;
                  }).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }

    // ==========================================
    // Global Actions (Event Handlers)
    // ==========================================
    window.handleAction = async (action, ...args) => {
      try {
        if(action === 'toggleLang') {
          state.lang = state.lang === 'bn' ? 'en' : 'bn';
          render();
        }
        else if(action === 'toggleAuthMode') {
          state.isLoginMode = !state.isLoginMode;
          state.authError = '';
          render();
        }
        else if(action === 'submitAuth') {
          args[0].preventDefault();
          const uid = document.getElementById('authUsername').value.trim().toLowerCase();
          const pass = document.getElementById('authPassword').value.trim();
          if(!uid || !pass) return;
          state.isSubmittingAuth = true; state.authError = ''; render();
          
          if (!state.user) {
             state.authError = t('loginErr');
             state.isSubmittingAuth = false; render(); return;
          }
          
          const userRef = getPublicDoc('users', uid);
          const docSnap = await getDoc(userRef);

          if (state.isLoginMode) {
            if (docSnap.exists() && docSnap.data().password === pass) {
               await setDoc(getPublicDoc('user_sessions', state.user.uid), { username: uid });
               state.activeUsername = uid;
            } else {
               state.authError = docSnap.exists() ? t('wrongPass') : t('userNotFound');
            }
          } else {
            if (docSnap.exists()) {
               state.authError = t('userExists');
            } else {
               const role = uid === 'admin' ? 'admin' : 'user';
               await setDoc(userRef, { name: uid, username: uid, password: pass, role: role, balance: 0, totalEarned: 0, withdrawMethod: '', withdrawAccount: '', createdAt: new Date().toISOString() });
               await setDoc(getPublicDoc('user_sessions', state.user.uid), { username: uid });
               state.activeUsername = uid;
            }
          }
          state.isSubmittingAuth = false;
          if(state.activeUsername) setupUserListeners();
          render();
        }
        else if(action === 'logout') {
          state.loading = true; render();
          if (state.user) await deleteDoc(getPublicDoc('user_sessions', state.user.uid)).catch(e => console.error("Crash",e));
          state.activeUsername = null; state.profile = null;
          if(unsubSettings) unsubSettings(); if(unsubProfile) unsubProfile(); if(unsubData) unsubData();
          state.loading = false; render();
        }
        else if(action === 'toggleForceUser') {
          state.forceUserView = !state.forceUserView; render();
        }
        else if(action === 'setTab') {
          state.tab = args[0]; render();
        }
        else if(action === 'setAdminTab') {
          state.adminTab = args[0]; render();
        }
        else if(action === 'setSubmitType') {
          state.submitType = args[0]; render();
        }
        else if(action === 'openPaste') {
          state.showPasteModal = true; render();
        }
        else if(action === 'closePaste') {
          state.showPasteModal = false; state.pasteText = ''; render();
        }
        else if(action === 'updatePasteText') {
          state.pasteText = args[0].target.value;
        }
        else if(action === 'applyPaste') {
          const rows = state.pasteText.split(/\r?\n/).map(r => r.split('\t'));
          for (let i = 0; i < rows.length; i++) {
            if (i >= 100) break;
            for (let j = 0; j < rows[i].length; j++) {
              if (j >= 4) break;
              state.gridData[i][j] = rows[i][j] || '';
            }
          }
          state.showPasteModal = false; state.pasteText = ''; render();
        }
        else if(action === 'resetGrid') {
          state.gridData = Array.from({ length: 100 }, () => Array(4).fill(''));
          state.submitMessage = t('resetSuccess');
          render();
          setTimeout(() => { state.submitMessage = ''; render(); }, 3000);
        }
        else if(action === 'submitSpreadsheet') {
          args[0].preventDefault();
          let allItems = [];
          state.gridData.forEach(row => {
            const rowText = row.filter(cell => cell.trim() !== '').join(' - ');
            if (rowText) allItems.push(rowText);
          });
          if (allItems.length === 0) {
            state.submitMessage = t('noDataErr'); render();
            setTimeout(() => { state.submitMessage = ''; render(); }, 3000);
            return;
          }
          state.isSubmittingData = true; state.submitMessage = ''; render();
          const uniqueItems = [...new Set(allItems)];
          const duplicatesCount = allItems.length - uniqueItems.length;
          try {
            const itemsToSubmit = uniqueItems.map((text, index) => ({ id: `item_${Date.now()}_${index}`, text: text, status: 'pending' }));
            await addDoc(getPublicCollection('submissions'), {
              userId: state.profile.id, userName: state.profile.name, type: state.submitType,
              items: itemsToSubmit, totalItems: itemsToSubmit.length, status: 'pending', createdAt: new Date().toISOString()
            });
            state.gridData = Array.from({ length: 100 }, () => Array(4).fill('')); 
            state.submitMessage = (state.lang === 'bn' ? `সফলভাবে ${uniqueItems.length} টি ডাটা সাবমিট হয়েছে!` : `Successfully submitted ${uniqueItems.length} data!`) + (duplicatesCount > 0 ? (state.lang === 'bn' ? ` (${duplicatesCount} ডুপ্লিকেট রিমুভ)` : ` (${duplicatesCount} dups removed)`) : '');
            state.isSubmittingData = false;
            render();
            setTimeout(() => { state.tab = 'history'; state.submitMessage = ''; render(); }, 2500);
          } catch(err) { console.error("Crash", err); state.submitMessage = "Error occurred"; state.isSubmittingData = false; render(); }
        }
        else if(action === 'viewSubDetails') {
          state.viewingSub = state.submissions.find(s => s.id === args[0]); render();
        }
        else if(action === 'closeSubDetails') {
          state.viewingSub = null; render();
        }
        else if(action === 'saveMethod') {
          args[0].preventDefault();
          state.isSavingMethod = true; render();
          try {
            await updateDoc(getPublicDoc('users', state.profile.id), {
              withdrawMethod: document.getElementById('w-method').value,
              withdrawAccount: document.getElementById('w-acc').value
            });
            state.withdrawMessage = state.lang === 'bn' ? 'পেমেন্ট মেথড সেভ হয়েছে!' : 'Payment method saved!';
          } catch(err) { console.error("Crash", err); state.withdrawMessage = "Error"; }
          state.isSavingMethod = false; render();
          setTimeout(() => { state.withdrawMessage = ''; render(); }, 3000);
        }
        else if(action === 'requestWithdraw') {
          args[0].preventDefault();
          const wAmount = parseInt(document.getElementById('w-amount').value);
          if (!state.profile.withdrawAccount) { state.withdrawMessage = state.lang === 'bn' ? 'আগে মেথড সেভ করুন!' : 'Save method first!'; render(); return; }
          if (isNaN(wAmount) || wAmount < 100) { state.withdrawMessage = state.lang === 'bn' ? 'সর্বনিম্ন ১০০ টাকা।' : 'Min 100 Taka'; render(); return; }
          if (wAmount > state.profile.balance) { state.withdrawMessage = state.lang === 'bn' ? 'পর্যাপ্ত ব্যালেন্স নেই!' : 'Insufficient balance!'; render(); return; }
          try {
            await updateDoc(getPublicDoc('users', state.profile.id), { balance: state.profile.balance - wAmount });
            await addDoc(getPublicCollection('withdrawals'), {
              userId: state.profile.id, userName: state.profile.name, amount: wAmount,
              method: state.profile.withdrawMethod, accountNo: state.profile.withdrawAccount,
              status: 'pending', createdAt: new Date().toISOString()
            });
            state.withdrawMessage = state.lang === 'bn' ? 'রিকোয়েস্ট পাঠানো হয়েছে।' : 'Request sent.';
            render();
            setTimeout(() => { state.withdrawMessage = ''; render(); }, 4000);
          } catch(err) { console.error("Crash", err); state.withdrawMessage = "Error"; render(); }
        }
        // ADMIN ACTIONS
        else if(action === 'openReview') {
           state.reviewingTask = state.submissions.find(s => s.id === args[0]); render();
        }
        else if(action === 'closeReview') {
           state.reviewingTask = null; render();
        }
        else if(action === 'reviewItem') {
           const [id, newStatus] = args;
           const it = state.reviewingTask.items.find(i => i.id === id);
           if(it) it.status = newStatus;
           render();
        }
        else if(action === 'acceptRemaining') {
           state.reviewingTask.items.forEach(it => { if(it.status === 'pending') it.status = 'accepted'; });
           render();
        }
        else if(action === 'finalizeReview') {
           if (state.reviewingTask.items.some(it => it.status === 'pending')) {
             state.adminErrorMsg = state.lang === 'bn' ? "সবগুলো রিভিউ করুন" : "Review all items"; render(); return;
           }
           state.adminErrorMsg = ''; state.isAdminProcessing = true; render();
           try {
              const acceptedCount = state.reviewingTask.items.filter(it => it.status === 'accepted').length;
              const rejectedCount = state.reviewingTask.items.filter(it => it.status === 'rejected').length;
              const totalPayout = acceptedCount * (state.prices[state.reviewingTask.type] || 0);

              const userRef = getPublicDoc('users', state.reviewingTask.userId);
              const userDoc = await getDoc(userRef);
              if (userDoc.exists()) {
                await updateDoc(userRef, {
                  balance: (userDoc.data().balance || 0) + totalPayout,
                  totalEarned: (userDoc.data().totalEarned || 0) + totalPayout
                });
              }
              await updateDoc(getPublicDoc('submissions', state.reviewingTask.id), {
                status: 'reviewed', items: state.reviewingTask.items, acceptedCount, rejectedCount, payout: totalPayout
              });
              state.reviewingTask = null;
           } catch(err) { console.error("Crash", err); }
           state.isAdminProcessing = false; render();
        }
        else if(action === 'adminProcessWithdraw') {
           const [id, newStatus, amountStr, userId] = args;
           const amount = parseInt(amountStr);
           try {
              await updateDoc(getPublicDoc('withdrawals', id), { status: newStatus });
              if (newStatus === 'rejected') {
                const userRef = getPublicDoc('users', userId);
                const userDoc = await getDoc(userRef);
                if (userDoc.exists()) await updateDoc(userRef, { balance: (userDoc.data().balance || 0) + amount });
              }
           } catch(err) { console.error("Crash", err); }
        }
        else if(action === 'savePrices') {
           args[0].preventDefault();
           state.isSavingMethod = true; render();
           try {
              await setDoc(getPublicDoc('settings', 'pricing'), {
                 '615x': Number(document.getElementById('price-615').value),
                 '1000x': Number(document.getElementById('price-1000').value)
              });
           } catch(err) { console.error("Crash", err); }
           state.isSavingMethod = false; render();
        }
      } catch (globalErr) {
        console.error("Action handler crash", globalErr);
      }
    };

    function attachSpreadsheetListeners() {
      const container = document.getElementById('spreadsheet-table');
      if(!container) return;
      container.oninput = (e) => {
        if(e.target.classList.contains('spreadsheet-cell')) {
           state.gridData[e.target.dataset.r][e.target.dataset.c] = e.target.value;
        }
      };
      container.onpaste = (e) => {
        if(e.target.classList.contains('spreadsheet-cell')) {
           e.preventDefault();
           handleAction('applyPasteFromCell', e.clipboardData.getData('text'), parseInt(e.target.dataset.r), parseInt(e.target.dataset.c));
        }
      };
    }
    
    // Add hidden handler for direct cell paste
    window.handleActionCellPaste = (text, startR, startC) => {
      const rows = text.split(/\r?\n/).map(r => r.split('\t'));
      for (let i = 0; i < rows.length; i++) {
        if (startR + i >= 100) break;
        for (let j = 0; j < rows[i].length; j++) {
          if (startC + j >= 4) break;
          state.gridData[startR + i][startC + j] = rows[i][j] || '';
        }
      }
      render();
    };

    const originalHandleAction = window.handleAction;
    window.handleAction = (action, ...args) => {
       if (action === 'applyPasteFromCell') {
          window.handleActionCellPaste(...args);
       } else {
          originalHandleAction(action, ...args);
       }
    };

    // ==========================================
    // Initialization & Listeners
    // ==========================================
    async function setupUserListeners() {
      if(unsubSettings) unsubSettings();
      if(unsubProfile) unsubProfile();
      if(unsubData) unsubData();

      unsubSettings = onSnapshot(getPublicCollection('settings'), (snap) => {
        let currentPrices = { '615x': 2, '1000x': 5 };
        snap.forEach(doc => { if (doc.id === 'pricing') currentPrices = { ...currentPrices, ...doc.data() }; });
        state.prices = currentPrices; render();
      });

      unsubProfile = onSnapshot(getPublicDoc('users', state.activeUsername), (docSnap) => {
        if (docSnap.exists()) {
           state.profile = { id: docSnap.id, ...docSnap.data() };
           state.loading = false;
           setupDataListeners();
           render();
        } else {
           state.activeUsername = null; state.loading = false; render();
        }
      });
    }

    function setupDataListeners() {
      if(unsubData) unsubData();
      unsubData = onSnapshot(getPublicCollection('submissions'), (snap) => {
        const subs = [];
        snap.forEach(doc => {
           const d = { id: doc.id, ...doc.data() };
           if(state.profile.role === 'admin' || d.userId === state.profile.id) subs.push(d);
        });
        subs.sort((a, b) => new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime());
        state.submissions = subs; 
        
        // Sync reviewing task if open
        if(state.reviewingTask) {
           const updatedTask = subs.find(s => s.id === state.reviewingTask.id);
           if(updatedTask && updatedTask.status !== 'pending') state.reviewingTask = null; // Auto close if resolved by another admin
        }
        render();
      });

      onSnapshot(getPublicCollection('withdrawals'), (snap) => {
        const ws = [];
        snap.forEach(doc => {
           const d = { id: doc.id, ...doc.data() };
           if(state.profile.role === 'admin' || d.userId === state.profile.id) ws.push(d);
        });
        ws.sort((a, b) => new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime());
        state.withdrawals = ws; render();
      });
      
      if(state.profile.role === 'admin') {
         onSnapshot(getPublicCollection('users'), (snap) => {
            const us = [];
            snap.forEach(doc => { const d = { id: doc.id, ...doc.data() }; if(d.role !== 'admin') us.push(d); });
            state.users = us; render();
         });
      }
    }

    async function boot() {
      if (!isFirebaseConfigured) {
        render(); // Render missing config immediately
        return;
      }

      // ALWAYS authenticate safely before doing DB calls
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (e) {
        console.error("Auth init crash", e);
      }

      onAuthStateChanged(auth, async (currentUser) => {
        if (currentUser) {
          state.user = currentUser;
          try {
            const sessionDoc = await getDoc(getPublicDoc('user_sessions', currentUser.uid));
            if (sessionDoc.exists()) {
              state.activeUsername = sessionDoc.data().username;
              setupUserListeners();
            } else {
              state.loading = false; 
              render();
            }
          } catch(e) { 
            console.error("Crash loading session:", e); 
            state.loading = false; 
            render(); 
          }
        } else {
          state.loading = false; 
          render();
        }
      });
    }

    boot();

  </script>
